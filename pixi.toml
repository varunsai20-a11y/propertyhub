[workspace]
authors = ["Varun <varunsai.1028@gmail.com>"]
channels = ["conda-forge"]
name = "propertyhub"
platforms = ["win-64"]
version = "0.1.0"

[tasks]
# ── Setup ──────────────────────────────────────────────────────────────────
install = { cmd = "npm install", description = "Install Node dependencies" }

# ── Development ────────────────────────────────────────────────────────────
dev     = { cmd = "npm run dev",     depends-on = ["install"], description = "Install deps then start Vite dev server (HMR)" }
start   = { cmd = "npm run dev",     depends-on = ["install"], description = "Alias for dev — start the website locally" }

# ── Production ─────────────────────────────────────────────────────────────
build   = { cmd = "npm run build",   depends-on = ["install"], description = "TypeScript check + Vite production build" }
preview = { cmd = "npm run preview", depends-on = ["build"],   description = "Build then preview production bundle locally" }

# ── Git / Deploy ───────────────────────────────────────────────────────────
push    = { cmd = "git add -A ; git commit -m 'chore: update' ; git push origin main", description = "Stage all changes, commit, and push to GitHub" }
deploy  = { cmd = "npm run build",   depends-on = ["install"], description = "Full production build ready for deployment" }

[dependencies]
nodejs = ">=20"
git    = ">=2"
